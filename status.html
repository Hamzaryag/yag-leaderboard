<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Status | Young Advisory Group</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
<style>
:root{
  --bg:#0e1423;
  --gold:#f4c76c;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --radius:18px;
  --blue:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at top left,#111a2e,#060912 120%);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
body::after{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(900px at var(--mx,50%) var(--my,40%),rgba(244,199,108,.02),transparent 90%);
  pointer-events:none;transition:background .2s ease-out;
}

/* nav */
nav{
  display:flex;justify-content:center;gap:2rem;
  padding:1.8rem 1rem 1rem;
}
nav a{color:var(--sub);text-decoration:none;font-weight:600;position:relative;transition:color .3s;}
nav a:hover,nav a.active{color:var(--gold);}
nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold);
}

/* header */
h1{text-align:center;font-weight:800;font-size:2.3rem;margin-top:.5rem;}
.subtitle{text-align:center;color:var(--sub);margin:0 0 2rem 0;animation:fadePulse 3s ease-in-out infinite alternate;}
@keyframes fadePulse{from{opacity:.8;}to{opacity:1;}}

/* grid container */
.wrapper{
  max-width:1100px;margin:0 auto;padding:0 1rem 4rem;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.5rem;
}

/* base card */
.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(10px);
  padding:1.4rem 1.6rem;
  display:flex;flex-direction:column;gap:.9rem;
  transform:translateY(25px);opacity:0;
  animation:fadeUp .8s forwards cubic-bezier(.2,.9,.2,1);
  box-shadow:0 8px 25px rgba(0,0,0,.35);
  transition:transform .3s,box-shadow .3s;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* layout in card */
.header{display:flex;align-items:center;justify-content:space-between;}
.person{display:flex;align-items:center;gap:1rem;}
.icon{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(145deg,#334155,#1e293b);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  border:2px solid rgba(244,199,108,.3);
  overflow:hidden;transition:transform .5s;
}
.card:hover .icon{transform:rotate(5deg) scale(1.1);}
.name{font-weight:700;font-size:1.05rem;}

/* badge */
.badge{
  padding:6px 11px;border-radius:999px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.1);color:var(--text);
}
.green{color:#22c55e;background:rgba(34,197,94,.12);}
.yellow{color:#facc15;background:rgba(250,204,21,.12);}
.orange{color:#fb923c;background:rgba(251,146,60,.12);}
.red{color:#ef4444;background:rgba(239,68,68,.12);}
.blue{color:#38bdf8;background:rgba(56,189,248,.12);}

.stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:.5rem 1rem;font-size:.9rem;
}
.stat-label{color:var(--sub);font-size:.8rem;}
.num{color:var(--gold);font-weight:700;}

/* ======  FREEZE EFFECT WITH SNOW  ====== */
.card.freeze{
  background:rgba(173,216,230,.08);
  border:1px solid rgba(173,216,230,.3);
  box-shadow:0 10px 40px rgba(59,130,246,.35);
  overflow:hidden;
}
.card.freeze::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(191,219,254,.15),rgba(59,130,246,.1));
  backdrop-filter:blur(12px);
}
.card.freeze .icon{
  background:linear-gradient(145deg,#1e3a8a,#2563eb);
  border-color:#93c5fd;
  box-shadow:0 0 12px rgba(59,130,246,.5);
}
.card.freeze .badge{
  background:rgba(96,165,250,.25);
  color:#dbeafe;
  text-shadow:0 0 8px rgba(191,219,254,.3);
}

/* sneeuwvlokjes */
.card.freeze .snow{
  position:absolute;top:-10px;
  width:100%;height:100%;overflow:hidden;
  pointer-events:none;
}
.card.freeze .snow span{
  position:absolute;display:block;
  top:-10px;
  width:8px;height:8px;
  background:#dbeafe;
  border-radius:50%;
  opacity:.8;
  animation:snowfall linear infinite;
}
@keyframes snowfall{
  0%{transform:translateY(0) translateX(0);opacity:.9;}
  100%{transform:translateY(120%) translateX(var(--wind));opacity:0;}
}
.card.freeze .snow span:nth-child(odd){animation-duration:8s;}
.card.freeze .snow span:nth-child(even){animation-duration:10s;}
/* random generator via JS zorgt voor verschillende windsnelheden */

/* hover shadow gold voor niet freeze */
.card:hover:not(.freeze){box-shadow:0 15px 40px rgba(244,199,108,.15);}

/* error */
.err{color:#fca5a5;text-align:center;margin-top:1rem;font-size:.9rem;}
</style>
</head>
<body>

<nav>
  <a href="index.html">Leaderboard</a>
  <a href="status.html" class="active">Status</a>
  <a href="hof.html">Topper vd maand</a>
</nav>

<h1>📊 Acquisitie Status</h1>
<p class="subtitle" id="subtitle">Statusoverzicht per persoon</p>

<div class="wrapper" id="cards"></div>
<p id="error" class="err"></p>

<script>
document.addEventListener('mousemove',e=>{
  document.body.style.setProperty('--mx',e.clientX+'px');
  document.body.style.setProperty('--my',e.clientY+'px');
});

function statusClass(status,freeze){
  if(freeze) return 'blue';
  const s=String(status||'').toLowerCase();
  if(s.includes('groen')) return 'green';
  if(s.includes('waarschuwing')) return 'yellow';
  if(s.includes('trakteren')) return 'orange';
  if(s.includes('tijdelijk')||s.includes('gesprek')) return 'red';
  return 'blue';
}

function countUp(el,val){
  const target=Number(val)||0;let n=0;
  const step=Math.max(1,Math.ceil(target/50));
  const t=setInterval(()=>{n+=step;if(n>=target){n=target;clearInterval(t);}el.textContent=n;},20);
}

function createSnow(container){
  const snow=document.createElement('div');
  snow.className='snow';
  for(let i=0;i<25;i++){
    const flake=document.createElement('span');
    flake.style.left=Math.random()*100+'%';
    flake.style.width=2+Math.random()*6+'px';
    flake.style.height=flake.style.width;
    flake.style.animationDelay=Math.random()*8+'s';
    flake.style.setProperty('--wind', (Math.random()*40-20)+'px');
    snow.appendChild(flake);
  }
  container.appendChild(snow);
}

async function load(){
  const wrapper=document.getElementById('cards');
  try{
    const res=await fetch('./status.json',{cache:'no-store'});
    const data=await res.json();
    wrapper.innerHTML='';
    const now=new Date();
    document.getElementById('subtitle').textContent=`Laatst bijgewerkt: ${now.toLocaleString('nl-NL')}`;

    data.forEach((p,i)=>{
      const card=document.createElement('div');
      card.className='card'+(p.freeze?' freeze':'');
      card.style.animationDelay=`${i*0.1}s`;
      const badge=statusClass(p.status,p.freeze);
      card.innerHTML=`
        <div class="header">
          <div class="person">
            <div class="icon">${p.icon||'⭐'}</div>
            <div class="name">${p.name||''}</div>
          </div>
          <span class="badge ${badge}">${p.freeze?'Freeze':p.status||'–'}</span>
        </div>
        <div class="stats">
          <div><div class="stat-label">Punten</div><div class="num" data-val="${p.points||0}">0</div></div>
          <div><div class="stat-label">Target</div><div class="num" data-val="${p.target||0}">0</div></div>
          <div><div class="stat-label">Streak</div><div class="num" data-val="${p.streak||0}">0</div></div>
          <div><div class="stat-label">Volgend target</div><div class="num" data-val="${p.next_target||0}">0</div></div>
        </div>
        <div class="stat-label" style="margin-top:.6rem;">Sanctie: <span style="color:var(--sub)">${p.sanction||'Geen'}</span></div>
        <div class="stat-label">Freeze: <span style="color:${p.freeze?'#60a5fa':'#94a3b8'}">${p.freeze?'Ja':'Nee'}</span></div>`;
      if(p.freeze) createSnow(card);
      wrapper.appendChild(card);
    });
    document.querySelectorAll('.num').forEach(el=>countUp(el,el.dataset.val));
  }catch(e){
    document.getElementById('error').textContent='Fout bij laden: '+e.message;
  }
}
load();
</script>
</body>
</html>
