<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Status | Young Advisory Group</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
<style>
:root{
  --bg:#0e1423;
  --gold:#f4c76c;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at top left,#131a2e,#060912 120%);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* zachtere ambient spot */
body::after{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(900px at var(--mx,50%) var(--my,40%),rgba(244,199,108,.02),transparent 90%);
  pointer-events:none;
  transition:background .2s ease-out;
}

/* nav */
nav{
  display:flex;justify-content:center;gap:2rem;
  padding:1.8rem 1rem 1rem;
}
nav a{color:var(--sub);text-decoration:none;font-weight:600;position:relative;transition:color .3s;}
nav a:hover,nav a.active{color:var(--gold);}
nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold);
}

/* header */
h1{text-align:center;font-weight:800;font-size:2.2rem;margin-top:.5rem;}
.subtitle{text-align:center;color:var(--sub);margin:0 0 2rem 0;}
.wrapper{
  max-width:1100px;margin:0 auto;padding:0 1rem 4rem;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.5rem;
}

/* card */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(10px);
  padding:1.2rem 1.5rem;
  display:flex;flex-direction:column;gap:.6rem;
  transform:translateY(20px);
  opacity:0;
  animation:fadeUp .8s cubic-bezier(.2,.9,.2,1) forwards;
  box-shadow:0 8px 25px rgba(0,0,0,.35);
  transition:transform .3s, box-shadow .3s;
}
@keyframes fadeUp{to{transform:translateY(0);opacity:1;}}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 16px 45px rgba(244,199,108,.15);
}

/* header-naam */
.header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;
}
.person{display:flex;align-items:center;gap:.7rem;}
.icon{
  width:44px;height:44px;border-radius:50%;
  background:#334155;display:flex;align-items:center;justify-content:center;
  font-size:22px;position:relative;
  transition:transform .5s cubic-bezier(.2,.9,.2,1);
}
.icon::after{
  content:"";position:absolute;inset:-4px;border-radius:50%;
  border:1.5px solid rgba(244,199,108,.25);
}
.card:hover .icon{transform:rotate(6deg) scale(1.1);}
.name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* badge */
.badge{
  display:inline-block;padding:6px 10px;border-radius:999px;
  font-size:12px;font-weight:700;text-transform:capitalize;
  box-shadow:0 0 8px rgba(0,0,0,.2);
  animation:breath 3s ease-in-out infinite;
}
@keyframes breath{
  0%,100%{opacity:.9;}
  50%{opacity:1;}
}
.green{color:#22c55e;background:rgba(34,197,94,.12);}
.yellow{color:#facc15;background:rgba(250,204,21,.12);}
.orange{color:#fb923c;background:rgba(251,146,60,.12);}
.red{color:#ef4444;background:rgba(239,68,68,.12);}
.blue{color:#3b82f6;background:rgba(59,130,246,.12);}

/* metrics binnen card */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:.4rem .8rem;font-size:.9rem;}
.stat-label{color:var(--sub);font-size:.75rem;}
.num{font-weight:700;color:var(--gold);}

/* error */
.err{color:#fca5a5;text-align:center;margin-top:1rem;font-size:.9rem;}
</style>
</head>
<body>

<nav>
  <a href="index.html">Leaderboard</a>
  <a href="status.html" class="active">Status</a>
  <a href="hof.html">Topper&nbsp;vd&nbsp;maand</a>
</nav>

<h1>📊 Acquisitie Status</h1>
<p class="subtitle" id="subtitle">Statusoverzicht per persoon</p>

<div class="wrapper" id="cards"></div>
<p id="error" class="err"></p>

<script>
document.addEventListener('mousemove',e=>{
  document.body.style.setProperty('--mx',e.clientX+'px');
  document.body.style.setProperty('--my',e.clientY+'px');
});

function statusClass(status,freeze){
  if(freeze) return 'blue';
  const s=String(status||'').toLowerCase();
  if(s.includes('groen')) return 'green';
  if(s.includes('waarschuwing')) return 'yellow';
  if(s.includes('trakteren')) return 'orange';
  if(s.includes('tijdelijk')||s.includes('gesprek')) return 'red';
  return 'blue';
}

function countUp(el,val){
  const target=Number(val)||0;
  let n=0;
  const step=Math.max(1,Math.ceil(target/50));
  const timer=setInterval(()=>{
    n+=step;
    if(n>=target){n=target;clearInterval(timer);}
    el.textContent=n;
  },20);
}

async function load(){
  const wrapper=document.getElementById('cards');
  try{
    const res=await fetch('./status.json',{cache:'no-store'});
    const data=await res.json();
    wrapper.innerHTML='';
    const now=new Date();
    document.getElementById('subtitle').textContent=`Laatst bijgewerkt: ${now.toLocaleString('nl-NL')}`;

    data.forEach((p,i)=>{
      const badge=statusClass(p.status,p.freeze);
      const card=document.createElement('div');
      card.className='card';
      card.style.animationDelay=`${i*0.1}s`;
      card.innerHTML=`
        <div class="header">
          <div class="person">
            <div class="icon">${p.icon||'⭐'}</div>
            <div class="name">${p.name||''}</div>
          </div>
          <span class="badge ${badge}">${p.status||'–'}</span>
        </div>
        <div class="stats">
          <div><div class="stat-label">Punten</div><div class="num" data-val="${p.points||0}">0</div></div>
          <div><div class="stat-label">Target</div><div class="num" data-val="${p.target||0}">0</div></div>
          <div><div class="stat-label">Streak</div><div class="num" data-val="${p.streak||0}">0</div></div>
          <div><div class="stat-label">Volgend target</div><div class="num" data-val="${p.next_target||0}">0</div></div>
        </div>
        <div class="stat-label" style="margin-top:.6rem;">Sanctie: <span style="color:var(--sub)">${p.sanction||'Geen'}</span></div>
        <div class="stat-label">Freeze: <span style="color:${p.freeze?'#60a5fa':'#94a3b8'}">${p.freeze?'Ja':'Nee'}</span></div>`;
      wrapper.appendChild(card);
    });
    document.querySelectorAll('.num').forEach(el=>{
      countUp(el,el.dataset.val);
    });
  }catch(e){
    document.getElementById('error').textContent='Fout bij laden: '+e.message;
  }
}
load();
</script>
</body>
</html>
