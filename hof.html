<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex, nofollow">
<title>Topper vd maand</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#0f172a;
color:#fff;
padding:34px 16px;
}

.wrap{max-width:900px;margin:0 auto;}

.nav{
display:flex;
gap:12px;
margin-bottom:25px;
}

.nav a{
color:white;
text-decoration:none;
padding:10px 14px;
background:#1e293b;
border-radius:10px;
font-weight:bold;
}

.nav a:hover{
background:#334155;
}

h1{
margin:0 0 18px 0;
text-align:center;
font-size:34px;
}

.board{
background:#111c33;
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
overflow:hidden;
box-shadow:0 18px 55px rgba(0,0,0,.35);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border-bottom:1px solid rgba(255,255,255,.07);
}

.row:last-child{
border-bottom:none;
}

.month{
font-weight:700;
color:#cbd5e1;
}

.name{
font-weight:800;
font-size:15px;
}

.score{
font-weight:900;
}

.current{
text-align:center;
margin-bottom:24px;
padding:18px;
background:#111c33;
border-radius:18px;
border:1px solid rgba(255,255,255,.08);
}

.icon{
font-size:40px;
margin-bottom:6px;
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="wrap">

<div class="nav">
<a href="./index.html">Leaderboard</a>
<a href="./status.html">Status</a>
<a href="./hof.html">Topper vd maand</a>
</div>

<h1>🏆 Topper van de maand</h1>

<div class="current" id="currentWinner"></div>

<div class="board" id="history"></div>

</div>

<script>

function startConfetti(){
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const colors = ["#f59e0b","#ef4444","#22c55e","#3b82f6","#a855f7","#ec4899","#facc15","#ffffff"];
const pieces = [];
const count = 220;

for(let i=0;i<count;i++){
pieces.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height - canvas.height,
w: 8 + Math.random() * 10,
h: 10 + Math.random() * 14,
color: colors[Math.floor(Math.random() * colors.length)],
speed: 2 + Math.random() * 5,
drift: -2 + Math.random() * 4,
rotation: Math.random() * 360,
rotationSpeed: -8 + Math.random() * 16
});
}

let start = Date.now();
let duration = 6000;

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p => {
p.y += p.speed;
p.x += p.drift;
p.rotation += p.rotationSpeed;

ctx.save();
ctx.translate(p.x, p.y);
ctx.rotate(p.rotation * Math.PI / 180);
ctx.fillStyle = p.color;
ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
ctx.restore();

if(p.y > canvas.height + 30){
p.y = -20;
p.x = Math.random() * canvas.width;
}
});

if(Date.now() - start < duration){
requestAnimationFrame(draw);
}else{
ctx.clearRect(0,0,canvas.width,canvas.height);
}
}

draw();
}

async function load(){

try{

let res = await fetch("./hof.json",{cache:"no-store"});
let data = await res.json();

let winners = data.winners || [];

let current = winners[0];

let currentBox = document.getElementById("currentWinner");

if(current){

currentBox.innerHTML = `
<div class="icon">${current.icon || "⭐"}</div>
<div class="name">${current.name || "Nog geen winnaar"}</div>
<div class="score">${current.score || 0} punten</div>
`;

}else{

currentBox.innerHTML = "Nog geen winnaar";

}

let history = document.getElementById("history");

winners.forEach(w=>{

let row = document.createElement("div");
row.className="row";

row.innerHTML = `
<div class="month">${w.month}</div>
<div class="name">${w.icon || "⭐"} ${w.name || ""}</div>
<div class="score">${w.score || 0}</div>
`;

history.appendChild(row);

});

startConfetti();

}catch(e){

document.getElementById("currentWinner").innerText="hof.json niet gevonden";

}

}

load();

</script>

</body>
</html>
