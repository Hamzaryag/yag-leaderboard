<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow">
  <title>YAG Acquisitie Leaderboard</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:#fff;
      padding:34px 16px;
    }

    .wrap{max-width:1100px;margin:0 auto;}

    /* NAVIGATIE */
    .nav{
      display:flex;
      gap:12px;
      margin-bottom:25px;
    }

    .nav a{
      color:white;
      text-decoration:none;
      padding:10px 14px;
      background:#1e293b;
      border-radius:10px;
      font-weight:bold;
    }

    .nav a:hover{
      background:#334155;
    }

    h1{margin:0 0 8px 0;text-align:center;font-size:34px;}
    .sub{margin:0 0 18px 0;text-align:center;color:#94a3b8;font-size:13px;}

    .board{
      background:#111c33;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      box-shadow: 0 18px 55px rgba(0,0,0,.35);
    }

    .headerRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      background:rgba(255,255,255,.04);
      border-bottom:1px solid rgba(255,255,255,.08);
      color:#cbd5e1;
      font-size:12px;
    }

    .lane{
      display:grid;
      grid-template-columns: 260px 1fr 90px;
      gap:14px;
      align-items:center;
      padding:12px 16px;
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .lane:last-child{border-bottom:none;}

    .who{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:46px;height:46px;
      border-radius:50%;
      border:2px solid #fff;
      background:#334155;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      flex:0 0 auto;
    }

    .name{
      font-weight:800;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rail{
      position:relative;
      height:22px;
      border-radius:999px;
      background: linear-gradient(90deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.10);
      overflow:hidden;
    }

    .finish{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      font-size:12px;
      opacity:.9;
    }

    .dot{
      position:absolute;
      top:50%;
      transform:translate(-50%,-50%);
      width:34px;height:34px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.95);
      background:#0b1220;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      transition:left .8s cubic-bezier(.2,.9,.2,1);
      box-shadow: 0 10px 18px rgba(0,0,0,.25);
    }

    .score{
      text-align:right;
      font-weight:900;
      color:#e2e8f0;
      font-size:14px;
    }

    .error{
      margin-top:14px;
      color:#fca5a5;
      font-size:12px;
      text-align:center;
      display:none;
    }
  </style>
</head>

<body>

<div class="wrap">

<div class="nav">
<a href="./index.html">Leaderboard</a>
<a href="./status.html">Status</a>
<a href="./hof.html">Topper vd maand</a>
</div>

<h1>🏆 YAGA Acquisitie Leaderboard</h1>
<div class="sub" id="subtitle">Automatisch gesorteerd op score</div>

<div class="board" id="board">
      <div class="headerRow">
        <span>Naam</span>
        <span>Progress</span>
        <span>Score</span>
      </div>
      <div id="lanes"></div>
    </div>

    <div class="error" id="err"></div>
  </div>

<script>
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }

  async function load(){
    try{
      const res = await fetch('./scores.json', { cache: 'no-store' });
      if(!res.ok) throw new Error('scores.json niet gevonden. Staat het bestand in je repo en is het gecommit?');

      const data = await res.json();
      data.forEach(p => p.score = Number(p.score || 0));

      data.sort((a,b) => (b.score - a.score) || String(a.name).localeCompare(String(b.name)));

      const maxScore = Math.max(1, ...data.map(p => p.score));

      const now = new Date();
      document.getElementById('subtitle').textContent =
        `Update: ${now.toLocaleString('nl-NL')} · Max score: ${maxScore}`;

      const lanes = document.getElementById('lanes');
      lanes.innerHTML = "";

data.forEach((p, i) => {

  let medal = "";
  if(i === 0) medal = "🥇";
  if(i === 1) medal = "🥈";
  if(i === 2) medal = "🥉";

  const leftPct = clamp((p.score / maxScore) * 94 + 2, 2, 96);

  const lane = document.createElement('div');
  lane.className = 'lane';
  lane.innerHTML = `
    <div class="who">
      <div class="avatar">${p.icon || "⭐"}</div>
      <div class="name">${p.name || ""}</div>
    </div>

    <div class="rail">
      <div class="finish">🏁</div>
      <div class="dot" style="left:${leftPct}%;">${p.icon || "⭐"}</div>
    </div>

    <div class="score">${medal} ${p.score}</div>
  `;
        lanes.appendChild(lane);
      });

    } catch(e){
      const err = document.getElementById('err');
      err.style.display = 'block';
      err.textContent = 'Fout: ' + e.message;
    }
  }

  load();
</script>
</body>
</html>
