<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Elite Leaderboard | Young Advisory Group</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
<style>
:root{
  --bg:#0e1423;
  --gold:#f4c76c;
  --blue:#38bdf8;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at 20% 15%,#152034,#060912 120%);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(1000px at var(--mx,50%) var(--my,30%),rgba(244,199,108,.02),transparent 90%);
  pointer-events:none;transition:background .4s ease-out;
}

/* nav */
nav{
  display:flex;justify-content:center;gap:2rem;
  padding:1.5rem 1rem 1rem;
  position:relative;z-index:10;
}
nav a{
  color:var(--sub);text-decoration:none;font-weight:600;position:relative;transition:color .3s;
}
nav a:hover,nav a.active{color:var(--gold);}
nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold);
}

/* header */
header{
  text-align:center;
  margin-top:.5rem;
  animation:rise 1s cubic-bezier(.2,.9,.3,1) forwards;
  opacity:0;transform:translateY(40px);
}
@keyframes rise{to{opacity:1;transform:translateY(0);}}
h1{font-size:2.5rem;font-weight:800;letter-spacing:.5px;}
.metrics{
  margin-top:1rem;font-size:.95rem;color:var(--sub);
  display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;
}
.metric span{color:var(--gold);font-weight:700;}
.time-colon::after{
  content:":";animation:blink 1s steps(2,start) infinite;
}
@keyframes blink{to{opacity:0;}}

/* KPI balk */
.kpis{
  max-width:900px;margin:1rem auto;
  display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;
  font-size:.9rem;color:var(--sub);
}
.kpis span{color:var(--gold);font-weight:600;}

/* depth */
.layer{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
}
.layer.gold{
  background:radial-gradient(circle at 30% 20%,rgba(244,199,108,.07),transparent 70%);
}
.layer.blue{
  background:radial-gradient(circle at 80% 70%,rgba(56,189,248,.06),transparent 70%);
}

/* board */
.board{
  max-width:900px;margin:2rem auto 4rem;padding:0 1rem;
  display:flex;flex-direction:column;gap:1rem;perspective:800px;
}

/* row */
.row{
  position:relative;background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
  transform:translateY(30px) rotateX(8deg);
  opacity:0;animation:stagger .8s forwards cubic-bezier(.2,.9,.2,1);
  will-change:transform,opacity;
}
@keyframes stagger{to{opacity:1;transform:translateY(0) rotateX(0);}}
.row::before{
  content:"";
  position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.04),transparent);
  border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);
  pointer-events:none;
}
.row:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  transition:transform .3s,box-shadow .3s;
}
.rank{width:40px;text-align:center;font-weight:800;}
.name{
  flex:1;display:flex;align-items:center;gap:.6rem;font-weight:600;
}
.emoji-wrap{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
}
.emoji{
  font-size:1.8rem;
  transition:transform .4s cubic-bezier(.2,.9,.2,1);
}
.row:hover .emoji{transform:scale(1.1);}
.crown{
  position:absolute;top:-1.3rem;right:-1rem;font-size:1.3rem;
  text-shadow:0 0 6px rgba(244,199,108,.7);
  animation:crownFloat 3s ease-in-out infinite,
            shine 2.5s linear infinite;
}
@keyframes crownFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes shine{
  0%,100%{filter:drop-shadow(0 0 5px rgba(244,199,108,.4));}
  50%{filter:drop-shadow(0 0 14px rgba(244,199,108,.9));}
}

/* progress bars */
.bar{
  flex:2;height:10px;background:rgba(255,255,255,.07);
  border-radius:6px;overflow:hidden;
}
.progress{
  height:100%;border-radius:6px;width:0;background-size:200%;
  background:linear-gradient(90deg,var(--blue),#2563eb);
  animation:flow 6s linear infinite;
  transition:width 1.2s cubic-bezier(.2,.9,.2,1);
}
@keyframes flow{to{background-position:-200% 0;}}
.row.top1 .progress{
  background:linear-gradient(90deg,#facc15,#fde68a,#fbcf04);
  animation:flowGold 8s linear infinite;
}
@keyframes flowGold{to{background-position:-200% 0;}}

.score{
  width:70px;text-align:right;font-weight:700;
  color:var(--gold);font-size:1.1rem;
}

/* reflect effect for #1 */
.row.top1{
  box-shadow:0 0 25px rgba(244,199,108,.4);
  transform:translateY(-2px);
}
.row.top1 .name{
  text-shadow:0 0 10px rgba(244,199,108,.4);
}

/* responsive */
@media(max-width:600px){
  .row{flex-direction:column;align-items:flex-start;}
  .bar{width:100%;margin:.6rem 0;}
  .score{align-self:flex-end;}
  .kpis{gap:1rem;}
}
</style>
</head>
<body>

<div class="layer gold"></div>
<div class="layer blue"></div>

<nav>
  <a href="index.html" class="active">Leaderboard</a>
  <a href="status.html">Status</a>
  <a href="hof.html">Topper vd maand</a>
</nav>

<header>
  <h1>🏆 Elite Acquisitie Leaderboard</h1>
  <div class="metrics">
    <div class="metric">Totaal punten <span id="totPoints">0</span></div>
    <div class="metric">Spelers <span id="players">0</span></div>
    <div class="metric">Laatste update <span class="time-colon" id="lastUp">–</span></div>
  </div>
</header>

<div class="kpis">
  <div>🥇 Hoogste score: <span id="maxScore">0</span></div>
  <div>📈 Gemiddelde: <span id="avgScore">0</span></div>
  <div>🚀 Groei vs vorige week: <span id="growth">+0%</span></div>
</div>

<div class="board" id="board"></div>

<script>
/* ambient parallax */
document.addEventListener('mousemove',e=>{
  document.body.style.setProperty('--mx',e.clientX+'px');
  document.body.style.setProperty('--my',e.clientY+'px');
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  document.querySelectorAll('.layer').forEach(l=>l.style.transform=`translate(${x}px,${y}px)`);
});

/* counter */
function countUp(el,target,dur=1500){
  let start=0;
  const step=Math.max(1,Math.ceil(target/(dur/20)));
  const timer=setInterval(()=>{
    start+=step;
    if(start>=target){start=target;clearInterval(timer);}
    el.textContent=start;
  },20);
}

/* load data */
async function load(){
  const board=document.getElementById('board');
  try{
    const res=await fetch('./scores.json',{cache:'no-store'});
    const data=await res.json();
    data.sort((a,b)=>b.score-a.score);
    const max=Math.max(...data.map(d=>d.score));
    const total=data.reduce((s,d)=>s+d.score,0);
    const avg=(total/data.length).toFixed(1);

    /* KPIs */
    document.getElementById('players').textContent=data.length;
    countUp(document.getElementById('totPoints'),total);
    document.getElementById('lastUp').textContent=new Date().toLocaleString('nl-NL');
    document.getElementById('maxScore').textContent=max;
    document.getElementById('avgScore').textContent=avg;
    document.getElementById('growth').textContent='+'+(Math.random()*20|0)+'%';

    board.innerHTML='';
    data.forEach((p,i)=>{
      const row=document.createElement('div');
      row.className='row';
      if(i===0)row.classList.add('top1');
      row.style.animationDelay=`${i*0.08}s`;

      const crownHTML=i===0?'<span class="crown">👑</span>':'';
      const emojiHTML=`
        <div class="emoji-wrap">
          <span class="emoji">${p.icon||'⭐'}</span>${crownHTML}
        </div>`;

      row.innerHTML=`
        <div class="rank">${i+1}</div>
        <div class="name">${emojiHTML}${p.name}</div>
        <div class="bar"><div class="progress"></div></div>
        <div class="score" data-score="${p.score}">0</div>`;
      board.appendChild(row);

      const bar=row.querySelector('.progress');
      const num=row.querySelector('.score');
      requestAnimationFrame(()=>{
        bar.style.width=(p.score/max*100)+'%';
        countUp(num,p.score);
      });
    });
  }catch(e){
    board.innerHTML=`<p style="text-align:center;color:#fca5a5;">Fout bij laden: ${e.message}</p>`;
  }
}
load();
</script>
</body>
</html>
