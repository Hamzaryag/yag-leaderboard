<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Elite Leaderboard | Young Advisory Group</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
<style>
:root{
  --bg:#0e1423;
  --gold:#f4c76c;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --blue:#38bdf8;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at 20% 15%,#152034,#060912 120%);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(800px at var(--mx,50%) var(--my,30%),rgba(244,199,108,.02),transparent 90%);
  pointer-events:none;transition:background .25s ease-out;
}

/* ===== light trail cursor ===== */
.trail{
  position:fixed;width:8px;height:8px;
  border-radius:50%;background:rgba(244,199,108,.5);
  pointer-events:none;mix-blend-mode:screen;
  transform:translate(-50%,-50%);
  transition:opacity .3s;
  z-index:10000;
}

/* ===== nav ===== */
nav{
  display:flex;justify-content:center;gap:2rem;
  padding:1.5rem 1rem 1rem;
  position:relative;z-index:10;
}
nav a{
  color:var(--sub);text-decoration:none;font-weight:600;position:relative;transition:color .3s;
}
nav a:hover,nav a.active{color:var(--gold);}
nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:var(--gold);border-radius:2px;box-shadow:0 0 8px var(--gold);
}

/* ===== hero intro ===== */
header{
  text-align:center;
  margin-top:.5rem;
  animation:rise 1s cubic-bezier(.2,.9,.3,1) forwards;
  opacity:0;transform:translateY(40px);
}
@keyframes rise{to{opacity:1;transform:translateY(0);}}
h1{font-size:2.5rem;font-weight:800;letter-spacing:.5px;}
.metrics{
  margin-top:1rem;font-size:.95rem;color:var(--sub);
  display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;
}
.metric span{color:var(--gold);font-weight:700;}

/* ===== parallax depth layers ===== */
.layer{
  position:fixed;inset:0;z-index:-1;pointer-events:none;
}
.layer.gold{
  background:radial-gradient(circle at 30% 20%,rgba(244,199,108,.07),transparent 70%);
}
.layer.blue{
  background:radial-gradient(circle at 70% 80%,rgba(56,189,248,.06),transparent 70%);
}

/* ===== leaderboard container ===== */
.board{
  max-width:900px;margin:2rem auto 4rem;padding:0 1rem;
  display:flex;flex-direction:column;gap:1rem;
  perspective:800px;
}

/* ===== leaderboard row ===== */
.row{
  position:relative;background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(10px);
  transform:translateY(30px) rotateX(10deg);
  opacity:0;animation:stagger .8s forwards cubic-bezier(.2,.9,.2,1);
}
@keyframes stagger{to{opacity:1;transform:translateY(0) rotateX(0);}}
.row:hover{
  transform:translateY(-4px) rotateX(0);transition:transform .3s,box-shadow .3s;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

/* ===== crown centered on avatar ===== */
.row.top1::before{
  content:"👑";
  position:absolute;top:4px;left:70px;
  transform:translateX(-50%);
  font-size:1.8rem;
  filter:drop-shadow(0 0 6px rgba(244,199,108,.9));
  animation:crownFloat 3s ease-in-out infinite;
}
@keyframes crownFloat{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-6px);}}

/* ===== styles by rank ===== */
.row.top1{box-shadow:0 0 25px rgba(244,199,108,.4);}
.row.top2,.row.top3{box-shadow:0 0 15px rgba(56,189,248,.2);}

/* ===== content columns ===== */
.rank{width:40px;text-align:center;font-weight:800;}
.name{
  flex:1;display:flex;align-items:center;gap:.6rem;font-weight:600;
}
.emoji{
  position:relative;font-size:1.8rem;
  transition:transform .5s cubic-bezier(.2,.9,.2,1);
}
.row:hover .emoji{transform:rotate(6deg) scale(1.1);}

.bar{
  flex:2;height:10px;background:rgba(255,255,255,.07);
  border-radius:6px;overflow:hidden;
}
.progress{
  height:100%;border-radius:6px;width:0;
  background-size:200%;
  transition:width 1.2s cubic-bezier(.2,.9,.2,1);
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{to{background-position:-200% 0;}}

/* bar colors */
.row.top1 .progress{background:linear-gradient(90deg,#facc15,#fde68a,#fbcf04);}
.progress{background:linear-gradient(90deg,var(--blue),#2563eb);}

.score{
  width:70px;text-align:right;font-weight:700;
  color:var(--gold);font-size:1.1rem;
}

/* hover tilt physics */
@media(hover:hover){
  .row:hover{
    transform:rotateX(2deg) rotateY(1deg) translateY(-6px);
  }
}

/* responsive */
@media(max-width:600px){
  .row{flex-direction:column;align-items:flex-start;}
  .bar{width:100%;margin:.6rem 0;}
  .score{align-self:flex-end;}
}

/* confetti canvas hidden behind UI */
canvas.confetti{position:fixed;inset:0;pointer-events:none;z-index:5;}
</style>
</head>
<body>

<div class="layer gold"></div>
<div class="layer blue"></div>

<nav>
  <a href="index.html" class="active">Leaderboard</a>
  <a href="status.html">Status</a>
  <a href="hof.html">Topper vd maand</a>
</nav>

<header>
  <h1>🏆 Elite Acquisition Leaderboard</h1>
  <div class="metrics">
    <div class="metric">Totaal punten <span id="totPoints">0</span></div>
    <div class="metric">Spelers <span id="players">0</span></div>
    <div class="metric">Laatste update <span id="lastUp">–</span></div>
  </div>
</header>

<div class="board" id="board"></div>
<canvas class="confetti"></canvas>
<div class="trail" id="trail"></div>

<script>
/* light-follow */
document.addEventListener('mousemove',e=>{
  document.body.style.setProperty('--mx',e.clientX+'px');
  document.body.style.setProperty('--my',e.clientY+'px');
});

/* light trail */
const trail=document.getElementById('trail');
let lastX=0,lastY=0;
document.addEventListener('mousemove',e=>{
  lastX=e.clientX;lastY=e.clientY;
});
function animateTrail(){
  trail.style.left=lastX+'px';trail.style.top=lastY+'px';
  requestAnimationFrame(animateTrail);
}
animateTrail();

/* confetti burst for #1 */
function doConfetti(){
  const canvas=document.querySelector('canvas.confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=innerWidth;canvas.height=innerHeight;
  const particles=[];
  for(let i=0;i<80;i++){
    particles.push({x:canvas.width/2,y:canvas.height/2,
      c:`hsl(${Math.random()*50+40},90%,60%)`,
      r:2+Math.random()*3,vx:(Math.random()-0.5)*6,vy:Math.random()*-6});
  }
  const tick=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.r*=0.98;
    });
    if(particles.some(p=>p.r>0.5))requestAnimationFrame(tick);
  }
  tick();setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),3000);
}

/* count-up */
function countUp(el,target,dur=1500){
  let start=0;
  const step=Math.max(1,Math.ceil(target/(dur/20)));
  const timer=setInterval(()=>{
    start+=step;
    if(start>=target){start=target;clearInterval(timer);}
    el.textContent=start;
  },20);
}

/* parallax move layers */
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  document.querySelectorAll('.layer').forEach(l=>{
    l.style.transform=`translate(${x}px,${y}px)`;
  });
});

/* load data */
async function loadData(){
  const board=document.getElementById('board');
  try{
    const res=await fetch('./scores.json',{cache:'no-store'});
    const data=await res.json();
    data.sort((a,b)=>b.score-a.score);
    const max=Math.max(...data.map(d=>d.score));

    document.getElementById('players').textContent=data.length;
    const total=data.reduce((s,d)=>s+d.score,0);
    countUp(document.getElementById('totPoints'),total);
    document.getElementById('lastUp').textContent=new Date().toLocaleString('nl-NL');

    board.innerHTML='';
    data.forEach((p,i)=>{
      const row=document.createElement('div');
      row.className='row';
      if(i===0)row.classList.add('top1');
      if(i===1)row.classList.add('top2');
      if(i===2)row.classList.add('top3');
      row.style.animationDelay=`${i*0.1}s`;
      row.innerHTML=`
        <div class="rank">${i+1}</div>
        <div class="name"><span class="emoji">${p.icon||'⭐'}</span>${p.name}</div>
        <div class="bar"><div class="progress"></div></div>
        <div class="score" data-score="${p.score}">0</div>`;
      board.appendChild(row);
      const prog=row.querySelector('.progress');
      const sc=row.querySelector('.score');

      requestAnimationFrame(()=>{
        prog.style.width=(p.score/max*100)+'%';
        countUp(sc,p.score);
        if(i===0)doConfetti();
      });
    });
  }catch(e){
    board.innerHTML=`<p style="text-align:center;color:#fca5a5;">Fout bij laden: ${e.message}</p>`;
  }
}
loadData();
</script>
</body>
</html>
