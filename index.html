<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Leaderboard | Young Advisory Group</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap)" rel="stylesheet">
<style>
:root{
  --bg:#0e1423;
  --accent:#f4c76c;
  --gold-light:#fde68a;
  --text:#f1f5f9;
  --sub:#94a3b8;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --radius:14px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(circle at top left,#131a2e,#060912 120%);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ===== Zachtere ambient glow ===== */
body::after{
  content:"";
  position:fixed;inset:0;
  background:radial-gradient(800px at var(--mx,50%) var(--my,30%),rgba(244,199,108,.03),transparent 90%);
  pointer-events:none;
  transition:background .2s ease-out;
}

/* ===== Navigatie ===== */
nav{
  display:flex;justify-content:center;gap:2rem;
  padding:1.8rem 1rem 1rem;
}
nav a{
  color:var(--sub);text-decoration:none;font-weight:600;position:relative;transition:color .4s;
}
nav a:hover{color:var(--gold-light);}
nav a.active{color:var(--gold-light);}
nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:var(--gold-light);border-radius:2px;
  box-shadow:0 0 8px var(--gold-light);
}

/* ===== Achtergrond orbs ===== */
.bg-orbs{
  position:fixed;inset:0;overflow:hidden;z-index:-1;
}
.bg-orbs span{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(244,199,108,.18),transparent 70%);
  animation:float 60s infinite linear;
}
.bg-orbs span:nth-child(1){width:300px;height:300px;top:10%;left:10%;}
.bg-orbs span:nth-child(2){width:400px;height:400px;bottom:10%;right:15%;animation-delay:10s;}
.bg-orbs span:nth-child(3){width:250px;height:250px;top:50%;right:40%;animation-delay:20s;}
@keyframes float{
  0%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-30px) rotate(180deg);}
  100%{transform:translateY(0) rotate(360deg);}
}

/* ===== Titel + metrics ===== */
header{text-align:center;margin-top:1rem;margin-bottom:2rem;}
h1{font-size:2.3rem;font-weight:800;letter-spacing:.5px;}
.subtitle{display:none;}         /* verwijderde tekst */
.metrics{
  margin-top:1.2rem;font-size:.95rem;color:var(--sub);
  display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;
}
.metric span{color:var(--gold-light);font-weight:700;}

/* ===== Leaderboard ===== */
.board{
  max-width:900px;margin:0 auto;padding:0 1rem 4rem;
  display:flex;flex-direction:column;gap:1rem;
}

/* ===== Rij / kaart ===== */
.row{
  position:relative;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1.3rem;
  display:flex;align-items:center;justify-content:space-between;
  overflow:hidden;
  transform:translateY(25px);
  opacity:0;
  animation:fadeUp .9s cubic-bezier(.2,.9,.2,1) forwards;
  backdrop-filter:blur(10px);
}
@keyframes fadeUp{to{transform:translateY(0);opacity:1;}}

/* Shine overlay */
.row::after{
  content:"";
  position:absolute;top:0;left:-70%;width:50%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.07),transparent);
  transform:skewX(-15deg);
}
.row:hover::after{animation:shine 1.8s ease;}
@keyframes shine{from{left:-70%;}to{left:130%;}}

/* ===== Kroontje herpositioneerd ===== */
.row.top1::before{
  content:"👑";
  position:absolute;
  top:-10px;          /* dichter boven avatar */
  left:70px;          /* gecentreerd boven emoji */
  font-size:1.6rem;
  filter:drop-shadow(0 0 6px rgba(244,199,108,.8));
  animation:crownFloat 3s ease-in-out infinite;
}
@keyframes crownFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}
.row.top1{box-shadow:0 0 35px rgba(244,199,108,.5);border-color:rgba(244,199,108,.3);}

/* Pulse ring rond avatar */
.row.top1 .emoji::after{
  content:"";position:absolute;inset:-6px;
  border-radius:50%;border:2px solid rgba(244,199,108,.35);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);opacity:.5;}
  50%{transform:scale(1.15);opacity:1;}
}

.rank{width:40px;text-align:center;font-weight:800;}
.name{
  flex:1;display:flex;align-items:center;gap:.6rem;font-weight:600;position:relative;
}
.emoji{
  position:relative;
  font-size:1.8rem;transition:transform .6s cubic-bezier(.2,.9,.2,1);
}
.row:hover .emoji{transform:rotate(6deg) scale(1.15);}

.bar{
  flex:2;height:10px;background:rgba(255,255,255,.07);
  border-radius:6px;overflow:hidden;position:relative;
}
.progress{
  height:100%;border-radius:6px;width:0;
  background-size:200%;
  transition:width 1.2s cubic-bezier(.2,.9,.2,1);
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{to{background-position:-200% 0;}}

/* kleurgradients per rang */
.row.top1 .progress{background:linear-gradient(90deg,#facc15,#fde68a,#fbcf04);}
.row.top2 .progress{background:linear-gradient(90deg,#d1d5db,#f9fafb);}
.row.top3 .progress{background:linear-gradient(90deg,#b45309,#facc15);}
.progress{background:linear-gradient(90deg,#cbd5e1,#facc15);}

.score{
  width:70px;text-align:right;font-weight:700;
  color:var(--gold-light);font-size:1.2rem;
}

/* ===== Responsief ===== */
@media(max-width:600px){
  .row{flex-direction:column;align-items:flex-start;}
  .bar{width:100%;margin:.6rem 0;}
  .score{align-self:flex-end;}
  h1{font-size:1.9rem;}
}
</style>
</head>
<body>

<div class="bg-orbs"><span></span><span></span><span></span></div>

<nav>
  <a href="index.html" class="active">Leaderboard</a>
  <a href="status.html">Status</a>
  <a href="hof.html">Topper&nbsp;vd&nbsp;maand</a>
</nav>

<header>
  <h1>🏆 Acquisitie Leaderboard</h1>
  <!-- verwijderde subtitle -->
  <div class="metrics">
    <div class="metric">Totaal punten <span id="totPoints">0</span></div>
    <div class="metric">Spelers <span id="players">0</span></div>
    <div class="metric">Laatste update <span id="lastUp">–</span></div>
  </div>
</header>

<div class="board" id="board"></div>

<script>
// zachtere muisgloed
document.addEventListener('mousemove',e=>{
  document.body.style.setProperty('--mx',e.clientX+'px');
  document.body.style.setProperty('--my',e.clientY+'px');
});

function countUp(el,target,dur=1500){
  let start=0;
  const step=Math.max(1,Math.ceil(target/(dur/20)));
  const timer=setInterval(()=>{
    start+=step;
    if(start>=target){start=target;clearInterval(timer);}
    el.textContent=start;
  },20);
}

async function loadData(){
  const board=document.getElementById('board');
  try{
    const res=await fetch('./scores.json',{cache:'no-store'});
    const data=await res.json();
    data.sort((a,b)=>b.score-a.score);
    const max=Math.max(...data.map(d=>d.score));

    document.getElementById('players').textContent=data.length;
    const total=data.reduce((s,d)=>s+d.score,0);
    countUp(document.getElementById('totPoints'),total);
    document.getElementById('lastUp').textContent=new Date().toLocaleString('nl-NL');

    board.innerHTML='';
    data.forEach((p,i)=>{
      const row=document.createElement('div');
      row.className='row';
      if(i===0)row.classList.add('top1');
      if(i===1)row.classList.add('top2');
      if(i===2)row.classList.add('top3');
      row.style.animationDelay=`${i*0.12}s`;
      row.innerHTML=`
        <div class="rank">${i+1}</div>
        <div class="name"><span class="emoji">${p.icon||'⭐'}</span>${p.name}</div>
        <div class="bar"><div class="progress"></div></div>
        <div class="score" data-score="${p.score}">0</div>`;
      board.appendChild(row);
      const prog=row.querySelector('.progress');
      const sc=row.querySelector('.score');
      requestAnimationFrame(()=>{
        prog.style.width=(p.score/max*100)+'%';
        countUp(sc,p.score);
      });
    });
  }catch(e){
    board.innerHTML=`<p style="text-align:center;color:#fca5a5;">Fout bij laden van JSON: ${e.message}</p>`;
  }
}
loadData();
</script>
</body>
</html>
